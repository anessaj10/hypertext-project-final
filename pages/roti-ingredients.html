<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flour & Fire — Roti Ingredients</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <span class="spice-mark" style="top: 10%; left: 5%; transform: rotate(-8deg);">flour</span>
  <span class="spice-mark" style="top: 20%; right: 7%; transform: rotate(6deg);">soft</span>
  <span class="spice-mark" style="bottom: 15%; left: 8%; transform: rotate(5deg);">fluffy</span>
  <span class="spice-mark" style="bottom: 8%; right: 6%; transform: rotate(-7deg);">measured</span>

  <main class="story-page">

    <nav class="page-nav">
      <a href="roti.html" class="nav-back">← back to roti</a>
    </nav>

    <p class="page-eyebrow">what goes in</p>
    <h1 class="page-title">🫓 the ingredients</h1>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <div class="story-fragment">
      <p>
        she uses her measuring cups.<br>
        without fail.<br>
        and every time it comes out perfect.
      </p>
    </div>

    <div class="ingredient-list">
      <div class="ingredient-item">
        <span class="ingredient-name">all purpose flour</span>
        <span class="ingredient-amount">2 cups</span>
      </div>
      <div class="ingredient-item">
        <span class="ingredient-name">baking powder</span>
        <span class="ingredient-amount">1 tsp</span>
      </div>
      <div class="ingredient-item">
        <span class="ingredient-name">salt</span>
        <span class="ingredient-amount">a dash.</span>
      </div>
      <div class="ingredient-item">
        <span class="ingredient-name">oil</span>
        <span class="ingredient-amount">2 tbsp</span>
      </div>
      <div class="ingredient-item">
        <span class="ingredient-name">water</span>
        <span class="ingredient-amount">¾ cup, warm</span>
      </div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-line"></div>
    </div>

    <p class="page-hint">
      <a href="roti-recipe.html" class="story-link link-spice">how its made →</a>
    </p>

  </main>

</html>
